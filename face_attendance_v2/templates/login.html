<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Face Attendance</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a3c5e,#2ecc71);
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:44px 40px;width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-box i.icon{font-size:3rem;color:#1a3c5e;margin-bottom:12px}
.login-box h2{font-size:1.4rem;color:#1a3c5e;margin-bottom:6px}
.login-box p{font-size:.85rem;color:#888;margin-bottom:28px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#444;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:11px 14px 11px 38px;border:1px solid #ddd;
  border-radius:8px;font-size:.95rem;outline:none;transition:.2s}
.input-wrap input:focus{border-color:#1a3c5e;box-shadow:0 0 0 3px rgba(26,60,94,.1)}
.input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa}
.btn-login{width:100%;padding:12px;background:#1a3c5e;color:#fff;border:none;
  border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
.btn-login:hover{background:#0f2540}
.error{background:#f8d7da;color:#721c24;padding:10px 14px;border-radius:8px;
  font-size:.85rem;margin-bottom:16px}
.hint{font-size:.8rem;color:#aaa;margin-top:16px}
</style>
</head>
<body>
<div class="login-box">
  <i class="fas fa-user-check icon"></i>
  <h2>Face Attendance System</h2>
  <p>Admin Portal — Sign in to continue</p>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in msgs %}
      <div class="error">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
  </form>
  <p class="hint">Default: admin / admin123</p>
</div>
</body>
</html>
