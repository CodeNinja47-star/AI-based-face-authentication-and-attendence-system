{% extends "base.html" %}
{% block page_title %}Add New User{% endblock %}
{% block content %}
<div class="card" style="max-width:520px">
  <h3><i class="fas fa-user-plus"></i> Register New User</h3>
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group"><label>Employee / Student ID *</label>
        <input type="text" name="emp_id" required placeholder="E.g. EMP001"></div>
      <div class="form-group"><label>Full Name *</label>
        <input type="text" name="name" required placeholder="Full name"></div>
      <div class="form-group"><label>Email</label>
        <input type="email" name="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Phone</label>
        <input type="text" name="phone" placeholder="+91..."></div>
      <div class="form-group" style="grid-column:span 2"><label>Department</label>
        <input type="text" name="department" placeholder="E.g. Computer Science"></div>
    </div>
    <div class="flex-row" style="margin-top:8px">
      <button type="submit" class="btn btn-success"><i class="fas fa-camera"></i> Save & Register Face</button>
      <a href="/users" class="btn btn-primary">Cancel</a>
    </div>
  </form>
  <p style="margin-top:16px;font-size:.85rem;color:#888">
    ⚠️ After saving, a camera window will open automatically to capture the face.
  </p>
</div>
{% endblock %}
